name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # `name` drives the published asset suffix (xray-${name}.zip) and
        # matches the convention sevaktigranyan305-netizen/3x-ui already
        # uses when it renames its extracted binary to xray-<os>-<arch>.
        # `goarm` is only set for 32-bit ARM variants.
        include:
          - { goos: linux,   goarch: amd64,           name: linux-amd64 }
          - { goos: linux,   goarch: '386',           name: linux-386 }
          - { goos: linux,   goarch: arm64,           name: linux-arm64 }
          - { goos: linux,   goarch: arm,   goarm: 7, name: linux-armv7 }
          - { goos: linux,   goarch: arm,   goarm: 6, name: linux-armv6 }
          - { goos: linux,   goarch: arm,   goarm: 5, name: linux-armv5 }
          - { goos: linux,   goarch: s390x,           name: linux-s390x }
          - { goos: windows, goarch: amd64,           name: windows-amd64 }
          - { goos: darwin,  goarch: amd64,           name: darwin-amd64 }
          - { goos: darwin,  goarch: arm64,           name: darwin-arm64 }
          - { goos: android, goarch: arm64,           name: android-arm64 }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      # Android builds need CGO + an NDK cross-compiler. All other targets
      # build cleanly with CGO_ENABLED=0 and the standard Go toolchain.
      - name: Set up Android NDK
        if: matrix.goos == 'android'
        run: |
          wget -qO android-ndk.zip https://dl.google.com/android/repository/android-ndk-r28b-linux.zip
          unzip -q android-ndk.zip
          rm android-ndk.zip
          NDK_BIN="$(realpath android-ndk-*/toolchains/llvm/prebuilt/linux-x86_64/bin)"
          case "${{ matrix.goarch }}" in
            arm64) CC="${NDK_BIN}/aarch64-linux-android24-clang" ;;
            amd64) CC="${NDK_BIN}/x86_64-linux-android24-clang" ;;
            *)     echo "unsupported android arch ${{ matrix.goarch }}" >&2; exit 1 ;;
          esac
          {
            echo "CC=${CC}"
            echo "CGO_ENABLED=1"
          } >> "$GITHUB_ENV"

      - name: Show toolchain
        run: |
          go version
          echo "GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} name=${{ matrix.name }}"

      - name: Build xray
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          # CGO_ENABLED is left unset here so the Android NDK step's
          # GITHUB_ENV value (CGO_ENABLED=1) wins for that target. For
          # every other target Go defaults CGO_ENABLED to 0 when
          # cross-compiling, which is exactly what we want.
        run: |
          mkdir -p dist
          if [[ "${GOOS}" == "windows" ]]; then
            go build -v -trimpath -ldflags "-s -w -buildid=" -o dist/xray.exe ./main
          else
            go build -v -trimpath -ldflags "-s -w -buildid=" -o dist/xray ./main
          fi

      - name: Package zip
        run: |
          cd dist
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            zip -j "xray-${{ matrix.name }}.zip" xray.exe
            rm xray.exe
          else
            zip -j "xray-${{ matrix.name }}.zip" xray
            rm xray
          fi
          sha256sum "xray-${{ matrix.name }}.zip" > "xray-${{ matrix.name }}.zip.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: xray-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release assets
        run: ls -la dist

      - name: Create GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber dist/*
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --generate-notes \
              dist/*
          fi
