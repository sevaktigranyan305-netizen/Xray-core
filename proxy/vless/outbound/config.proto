syntax = "proto3";

package xray.proxy.vless.outbound;
option csharp_namespace = "Xray.Proxy.Vless.Outbound";
option go_package = "github.com/xtls/xray-core/proxy/vless/outbound";
option java_package = "com.xray.proxy.vless.outbound";
option java_multiple_files = true;

import "common/protocol/server_spec.proto";

// VirtualNetwork, when enabled, switches this outbound into L3 tunnel mode:
// after the standard VLESS handshake the connection becomes a
// length-prefixed IPv4 stream (see proxy/vless/virtualnet) and a real
// system TUN interface is created on the client side with the IP the
// server announces. All traffic destined to the configured subnet is
// routed through the tunnel.
message VirtualNetwork {
  bool enabled = 1;
  // Subnet is the virtual network the server is announcing (e.g.
  // "10.0.0.0/24"). Optional; defaults to 10.0.0.0/24.
  string subnet = 2;
  // InterfaceName is the preferred kernel interface name. Ignored on
  // darwin (utunN is kernel-assigned). Optional; defaults to "xray0".
  string interface_name = 3;
  // MTU is the TUN interface MTU. 0 means use the package default.
  int32 mtu = 4;
  // DefaultRoute, when true, hijacks 0.0.0.0/0 through the TUN so all
  // internet traffic from this host is tunnelled to the VLESS server.
  // The server's real IP is automatically excluded via the underlay
  // gateway to avoid a routing loop. When false (default), only the
  // virtual subnet is routed through the TUN.
  bool default_route = 5;
}

message Config {
  xray.common.protocol.ServerEndpoint vnext = 1;
  VirtualNetwork virtual_network = 2;
}
