syntax = "proto3";

package xray.proxy.vless.inbound;
option csharp_namespace = "Xray.Proxy.Vless.Inbound";
option go_package = "github.com/xtls/xray-core/proxy/vless/inbound";
option java_package = "com.xray.proxy.vless.inbound";
option java_multiple_files = true;

import "common/protocol/user.proto";

message Fallback {
  string name = 1;
  string alpn = 2;
  string path = 3;
  string type = 4;
  string dest = 5;
  uint64 xver = 6;
}

message VirtualNetwork {
  // Enable L3 virtual networking for this inbound. When false (or the
  // message is absent) the inbound behaves identically to vanilla VLESS.
  bool enabled = 1;
  // Subnet in CIDR form. Default: 10.0.0.0/24. The first host is used
  // as the gateway bound to the server's gVisor stack.
  string subnet = 2;
  // Keep UUID -> IP assignments even after a user disconnects, so the
  // same user gets the same IP when they return. Defaults to true.
  bool persist_mapping = 3;
}

message Config {
  repeated xray.common.protocol.User clients = 1;
  repeated Fallback fallbacks = 2;

  string decryption = 3;
  uint32 xorMode = 4;
  int64 seconds_from = 5;
  int64 seconds_to = 6;
  string padding = 7;

  VirtualNetwork virtual_network = 8;
}
